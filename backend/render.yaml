services:
  - type: web
    name: signal-gabon-api
    runtime: docker
    dockerfilePath: ./Dockerfile
    plan: free
    healthCheckPath: /up
    envVars:
      - key: APP_NAME
        value: SignalGabon
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: false
      - key: APP_KEY
        generateValue: true
      - key: DB_CONNECTION
        value: pgsql
      - key: DB_HOST
        fromDatabase:
          name: signal-gabon-db
          property: host
      - key: DB_PORT
        fromDatabase:
          name: signal-gabon-db
          property: port
      - key: DB_DATABASE
        fromDatabase:
          name: signal-gabon-db
          property: database
      - key: DB_USERNAME
        fromDatabase:
          name: signal-gabon-db
          property: user
      - key: DB_PASSWORD
        fromDatabase:
          name: signal-gabon-db
          property: password
      - key: SESSION_DRIVER
        value: file
      - key: CACHE_STORE
        value: file
      - key: QUEUE_CONNECTION
        value: sync
      - key: LOG_CHANNEL
        value: stderr

databases:
  - name: signal-gabon-db
    plan: free
    databaseName: signalgabon
    user: signalgabon
